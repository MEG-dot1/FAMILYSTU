  function buildPRVArticle(){
    return `
      <blockquote class="pull-quote reveal in" style="--accent:var(--elastic)">
        "It's painful to perceive that our relational value, that is, the degree to which others consider their relationships with us to be valuable and important, is lower than we would like it to be."
        <cite>Intimate Relationships, 9th Edition &middot; Rowland S. Miller</cite>
      </blockquote>

      <div class="article-body reveal in">
        <p>"Hey! Are we still on for dinner tonight?" You hit send and wait for a reply.</p>
      </div>

      <figure class="article-figure narrow reveal in">
        <img src="images/prv-text-message.png" alt="A text message that says Hey it's Gina! I still want to hang out. What's your schedule like these days? marked as delivered but not read.">
        <figcaption>Sent. Delivered. Still waiting.</figcaption>
      </figure>

      <div class="article-body reveal in">
        <p>An hour passes, then another. You realize they've been active on social media, but your message is still left unread. Over the next few weeks, it keeps happening. You're always the one making plans. You're always the one checking in. Eventually, you stop trying altogether.</p>
        <p>You start asking yourself the following: "Did I do something wrong?" "Am I just not important to them anymore?" "Maybe they just don't value this friendship the way I do."</p>
        <p>This story isn't really about an unanswered text. It's about what that unanswered text represents. Situations like this can make us wonder how much we matter to someone else. This concept is known as perceived relational value.</p>

        <h3>Understanding Perceived Relational Value</h3>
        <p>Perceived relational value refers to how much we believe another person values their relationship with us (Miller, 2021). Every close relationship sends messages about where we stand. These messages come through everyday interactions, such as making time for someone, checking in, remembering important events, or including them in plans. Over time, these behaviours shape our perception of how much we are valued.</p>
        <p>Perceived relational value can be either high or low depending on how we interpret another person's behaviour (Miller, 2021). High perceived relational value means we believe another person values having a relationship with us. We feel wanted, appreciated and included. On the other hand, low perceived relational value means we believe another person doesn't value the relationship as much. We may feel ignored, overlooked, or unimportant.</p>

        <h3>Why Does It Matter?</h3>
        <p>Humans have a natural need to feel accepted by others. As a result, we naturally pay attention to how people treat us. Our relationships with others help shape our sense of belonging. When we believe someone values us less than before, it can create feelings of disappointment and insecurity.</p>

        <div class="article-note">
          <strong>Note:</strong> it is important to remember that perceived relational value is based on our interpretation of another person's behaviour (Miller, 2021). Sometimes our assumptions are accurate, but other times there may be explanations we don't know about, such as stress, work commitments, or personal problems. This is why communication is a key factor to building healthy relationships.
        </div>

        <p>Perceived relational value is closely connected to relational devaluation. While perceived relational value refers to how much we believe another person values their relationship with us, relational devaluation occurs when we perceive that this value has decreased over time (Miller, 2021). Instead of asking, "How much does this person value me?" relational devaluation asks, "Do they value me less than they used to?" For example, if a close friend who once regularly called, invited you out, and made time for you suddenly becomes distant, you may begin to feel that your importance in their life has decreased. This apparent decrease in relational value is what often leads to hurt feelings. In a way, relational devaluation can be understood as a decline in perceived relational value.</p>

        <h3>Degrees of Acceptance and Rejection</h3>
        <p><strong>Being accepted or rejected by others is not an all-or-nothing event.</strong> People can desire our company to greater or lesser degrees, and researchers use these labels to describe the different extents to which we may be included or excluded by others.</p>

        <div class="spectrum-list">
          <div class="spectrum-item accept">
            <h4>Minimal inclusion</h4>
            <p>Others seek us out and go out of their way to interact with us.</p>
          </div>
          <div class="spectrum-item accept">
            <h4>Active inclusion</h4>
            <p>Others want us and welcome us but do not go to lengths to be with us.</p>
          </div>
          <div class="spectrum-item accept">
            <h4>Passive inclusion</h4>
            <p>Others allow us to be included.</p>
          </div>
          <div class="spectrum-item neutral">
            <h4>Ambivalence</h4>
            <p>Others do not care whether we are included or not.</p>
          </div>
          <div class="spectrum-item reject">
            <h4>Passive exclusion</h4>
            <p>Others ignore us but do not avoid us.</p>
          </div>
          <div class="spectrum-item reject">
            <h4>Active exclusion</h4>
            <p>Others avoid us, tolerating our presence only when necessary.</p>
          </div>
          <div class="spectrum-item reject">
            <h4>Maximal exclusion</h4>
            <p>Others banish us, sending us away, or abandon us.</p>
          </div>
        </div>

        <p class="source-note">Source: Leary, M. R. (2001). Toward a conceptualization of interpersonal rejection. In M. R. Leary (Ed.), <em>Interpersonal rejection</em> (pp. 5&ndash;28). Oxford University Press.</p>

        <h3>Why Small Moments Matter</h3>
        <p>Perceived relational value is shaped by everyday interactions. A single unanswered text or cancelled plan is unlikely to change a relationship, but repeated experiences of being ignored or left out can make someone feel taken for granted. These situations may lead people to question how much they are valued.</p>
        <p>At the end of the day, strong relationships are built through small, consistent actions that communicate appreciation, respect and inclusion. Making time for someone, checking in, sending an invite, and showing gratitude can strengthen perceived relational value. Although these actions may seem small, they send an important message about how much we value the people in our lives.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--elastic)">

        <p>How do you think social media influences perceived relational value? Can online interactions, such as being left on read, not being tagged in a post, or receiving few likes or comments, affect how people feel about their relationships?</p>
      </div>
    `;

  function buildOstracismArticle(){
    return `
      <div class="definition-box reveal in" style="--accent:var(--elastic)">
        <span class="term">Ostracism</span><span class="pos">noun</span>
        the act of intentionally ignoring or excluding another person, often referred to as the silent treatment (Merriam-Webster, n.d.).
      </div>

      <div class="article-body reveal in">
        <p>Almost everyone has experienced the silent treatment at some point, whether from a friend, family member, or romantic partner. Unlike an argument, where both people communicate through the problem, ostracism involves stopping communication altogether. A person may ignore messages, refuse to respond in conversation, avoid eye contact, or behave as if the other person is not even there.</p>
        <p>Although it may seem like a simple way to avoid conflict, ostracism, in fact, is one of the most stressful forms of rejection (Miller, 2021). This is because it often leaves the other person confused and looking for answers.</p>

        <h3>Understanding Ostracism</h3>
        <p>Ostracism is a form of rejection in which someone intentionally ignores or excludes another person. In close relationships, it's commonly known as the silent treatment or giving someone the cold shoulder. Instead of expressing anger or explaining what is wrong, the person purposely stops all communication, sometimes going as far as pretending the other person isn't even present.</p>
        <p>Ostracism is surprisingly common. In fact, 78% of Americans have reported having experienced ostracism in their lifetime (Hales &amp; Wood, 2024). People often use the silent treatment because they want to punish someone, avoid confrontation, or give themselves time to calm down after a disagreement. However, unlike healthy communication, ostracism rarely includes an explanation. As a result, the person being ignored is often left wondering what they did wrong or why they are being treated differently. This uncertainty is one of the main reasons ostracism can create significant stress and strain in relationships.</p>

        <h3>Why is the Silent Treatment so Harmful?</h3>

        <figure class="article-figure reveal in">
          <img src="images/ostracism-phone.png" alt="A woman sitting on a couch looking at her phone with a concerned expression, waiting for a reply.">
          <figcaption>Waiting for a reply that may never come is one of the most stressful parts of being ostracized.</figcaption>
        </figure>

        <p>The hardest part of ostracism is the uncertainty it creates. During an argument, people at least know what the disagreement is about. With the silent treatment, however, there is often no explanation at all. This uncertainty causes people to question themselves:</p>

        <ul class="quote-list">
          <li>"Did I say something wrong?"</li>
          <li>"Are they upset with me?"</li>
          <li>"Do they even want to be around me anymore?"</li>
        </ul>

        <p>Because there are no answers, many people replay recent conversations and interactions, trying to figure out what caused the silence. This confusion is one of the reasons ostracism creates so much strain in relationships.</p>
        <p>Ostracism is also closely connected to perceived relational value. When someone intentionally ignores us, we often interpret their behaviour as a sign that they no longer value their relationship with us. Whether or not that interpretation is accurate, this perceived decrease in relational value often leads to hurt feelings, insecurity, and emotional distress.</p>
        <p>Research done by the National Library of Medicine discussed that these effects are strong during adolescence. In a study of 1,315 Chinese high school students, researchers found that adolescents who experienced more ostracism were also more likely to socially withdraw from others. It found that ostracism threatened adolescents' self-esteem, which in turn increased their tendency to avoid social situations. Adolescence is already a period when people are particularly sensitive to rejection, so being ignored can make them question their self-worth and become less willing to build or maintain relationships (Lei et al., 2024).</p>

        <h3>A Cold Shoulder Feels Cold</h3>
        <p>Ostracism threatens several of our most basic psychological needs. Being ignored weakens our sense of belonging, lowers our self-esteem, reduces our feeling of control over the situation, and can even make us feel less human. Rather than simply being sad, people often experience confusion, stress, frustration, and anger.</p>
        <p>Also, the effects of ostracism aren't only emotional. Studies have found that people who are excluded report that a room feels colder than it actually is and are more likely to want warm food or drinks. Their bodies also release cortisol, a hormone associated with stress. Even time seems to pass more slowly. In one experiment, participants who felt accepted estimated a 40 second interval as about 42 seconds, while those who had been rejected believed about 64 seconds had passed (Miller, 2021). This proves that being ignored affects both the mind and body.</p>

        <h3>How Do People Respond to Ostracism</h3>
        <p>Not everyone reacts to the silent treatment in the same way.</p>
        <p>Some people try to repair the relationship. They may try to apologize, become more agreeable, or work harder to regain the other person's acceptance, especially if they believe the relationship can still be saved. Others react very differently. When the silent treatment starts to feel unfair, people often become angry or resentful. As a result, they may withdraw, lash out, or even end the relationship altogether.</p>
        <p>Moreover, self-esteem plays a significant role. People with higher self-esteem are generally more likely to leave relationships where they are repeatedly ignored and seek healthier relationships instead. Those with lower self-esteem are more likely to remain in the relationship while holding onto resentment or responding with the silent treatment themselves.</p>

        <h3>The Bottom Line</h3>
        <p>Although the silent treatment may feel like an easy way to avoid conflict or express frustration, it often creates more problems than it solves. Instead of helping the other person understand what went wrong, ostracism usually leaves them confused, hurt, and questioning their place in the relationship.</p>
        <p>Healthy relationships are strengthened through honest communication, even during disagreements. Talking through a problem may be uncomfortable, but it gives both people the opportunity to understand one another and work toward a solution. In contrast, silence often leaves both people feeling further apart than before.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--elastic)">
        <div class="topic-kicker">Reflection question</div>
        <p>Have you ever experienced the silent treatment or unintentionally given it to someone else? How do you think clear communication could have changed the situation?</p>
      </div>
    `;
  }

  function buildJealousyArticle(){
    return `
      <div class="article-body reveal in">
        <p>You're out with your partner when someone they used to date comes over to say hello. They hug, laugh about an old memory, and continue talking for several minutes. Nothing inappropriate happens, but you can't stop thinking about it for the rest of the day.</p>
      </div>

      <ul class="quote-list">
        <li>Were they just catching up?</li>
        <li>Should you be worried?</li>
        <li>Or are your emotions creating a threat that doesn't actually exist?</li>
      </ul>

      <div class="article-body reveal in">
        <p>Most people experience jealousy at some point in a relationship. In fact, it is a normal emotional response when we believe an important relationship may be at risk. However, not all jealousy is the same. Understanding the different types of jealousy can help us recognize when our feelings are based on a real concern and when they may be driven by our own fears or insecurities.</p>

        <h3>Understanding Jealousy</h3>
        <p>Jealousy is an emotional response that occurs when we perceive the possible loss of a valued relationship to a real or imagined rival. Sometimes jealousy is confused with envy (Miller, 2021). Unlike envy, which involves wanting something another person has, jealousy is rooted in the fear of losing something we already have.</p>
        <p>Jealousy is primarily made of three emotions: hurt, fear, and anger (Miller, 2021). Hurt occurs when we believe our partner no longer values the relationship as much as we do. Fear comes from the possibility of losing the relationship. Finally, anger is often directed toward both the romantic rival and the partner.</p>

        <h3>Types of Jealousy</h3>
      </div>

      <div class="table-scroll reveal in">
        <table class="jealousy-table">
          <thead>
            <tr>
              <th class="reactive"><span class="th-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 13l4 4L19 7"/></svg></span>Reactive Jealousy</th>
              <th class="suspicious"><span class="th-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9.5 9a2.5 2.5 0 015 0c0 1.5-2.5 2-2.5 3.5M12 17h.01"/></svg></span>Suspicious Jealousy</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong class="row-label">What it is</strong>Occurs in response to an actual threat to a valued relationship.</td>
              <td><strong class="row-label">What it is</strong>Occurs when there is no evidence that a partner has misbehaved.</td>
            </tr>
            <tr>
              <td><strong class="row-label">Based on</strong>Based on facts or behaviours that reasonably threaten the relationship.</td>
              <td><strong class="row-label">Based on</strong>Based on assumptions, mistrust, or imagined possibilities rather than facts.</td>
            </tr>
            <tr>
              <td><strong class="row-label">Example</strong>Your partner openly flirts with someone else or admits they are interested in another person.</td>
              <td><strong class="row-label">Example</strong>Your partner regularly texts a longtime friend, but nothing in their conversations suggests romantic interest.</td>
            </tr>
            <tr>
              <td><strong class="row-label">Typically</strong>Usually reflects concern about a genuine relationship issue.</td>
              <td><strong class="row-label">Typically</strong>Can lead to overthinking, constant reassurance seeking, or unnecessary conflict.</td>
            </tr>
          </tbody>
        </table>
      </div>
    `;
  }

  function buildJealousyProneArticle(){
    return `
      <div class="article-body reveal in">
        <h3>Why Some People Experience More Jealousy Than Others</h3>
        <p>Many people assume that women are naturally more jealous than men, but research suggests this isn't true. Overall, men and women do not differ significantly in their tendency to experience jealousy (Miller, 2021). Instead, jealousy varies from person to person based on individual experiences, personality, and relationship dynamics (Miller, 2021).</p>

        <p>One factor that influences jealousy is <strong>dependence on the relationship</strong> (Miller, 2021). People who feel they have few alternatives or believe they need their current partner are often more sensitive to anything that threatens the relationship. Because they think they have more to lose, even small signs of a romantic rival can feel overwhelming. On the other hand, people who feel more secure and believe they could cope if the relationship ended tend to experience less jealousy.</p>

        <p>Another important factor is <strong>self-confidence within the relationship</strong> (Miller, 2021). People who constantly question whether they are "good enough" for their partner are more likely to become jealous. They may worry that they can't meet their partner's expectations or are afraid that someone else could offer more. Although people with high self-esteem generally experience less jealousy, even confident individuals may become jealous if they doubt their value in a particular relationship.</p>

        <p>Next is <strong>mate value</strong>. Mate value refers to the qualities a person brings to a relationship, such as physical attractiveness, intelligence, personality, talent, financial stability, or social status (Miller, 2021). If one partner believes the other has a much higher mate value than they do, they may become concerned that someone "better" could attract their partner. These feelings of inadequacy can increase jealousy, even when there is no real threat to the relationship.</p>

        <p><strong>Attachment style</strong> also plays a key role (Miller, 2021). People with a preoccupied attachment style tend to experience the highest levels of jealousy because they strongly desire closeness but often worry that their partner doesn't love them as much in return. This constant fear of rejection makes them more likely to interpret situations as relationship threats. On the other hand, people with a dismissing attachment style are generally less affected by jealousy because they value independence and are less emotionally dependent on romantic relationships.</p>

        <p>Finally, <strong>personality traits</strong> influence how easily someone becomes jealous. Individuals who score high in neuroticism, a personality trait associated with worry and emotional instability, are more likely to experience jealousy because they naturally expect negative outcomes. Instead, people who are more agreeable tend to be trusting and cooperative, making them less likely to become jealous.</p>
      </div>
    `;
  }

          </g>

          <g class="chart-bar-group women" style="--glow:var(--fracture); animation-delay:0.38s, 1.13s">
            <polygon class="chart-face-side" points="390,32.5 404,23.5 404,201 390,210" fill="#B23350"/>
            <polygon class="chart-face-top" points="340,32.5 390,32.5 404,23.5 354,23.5" fill="#FF93A8"/>
            <rect class="chart-face-front" x="340" y="32.5" width="50" height="177.5" fill="var(--fracture)"/>
          </g>
        </svg>
        <div class="chart-x-labels">
          <div class="chart-x-label">"Did you have SEX with him/her?"</div>
          <div class="chart-x-label">"Do you LOVE him/her?"</div>
        </div>
        <p class="chart-caption">The wounded partners' primary focus when confronting a cheating partner</p>
        <p class="source-note">Source: Miller, R. S. (2021). <em>Intimate relationships</em> (9th ed.). McGraw-Hill Education.</p>
      </div>

      <div class="article-body reveal in">
        <p>An evolutionary perspective suggests that these differences developed because men and women historically faced different reproductive challenges. For men, sexual infidelity created paternity uncertainty, meaning they could never be 100% sure that a child was biologically theirs. Investing time, energy, and resources into raising another man's child would have reduced their own reproductive success. As a result, sexual infidelity represented a particularly significant threat.</p>

        <p>For women, the greater evolutionary concern was often emotional infidelity. If a partner formed a deep emotional bond with someone else, there was a greater risk that he would withdraw his time, protection, commitment, and resources from the relationship and invest them in another partner instead. Because these resources were important for raising children throughout human history, losing a partner's emotional commitment posed a significant threat.</p>

        <div class="article-note">
          <strong>Note:</strong> It is important to remember that this is one explanation for differences in jealousy. Not every individual responds in the same way, and people's experiences are also shaped by factors such as their personality, attachment style, personal values, and life experiences. With that said, the evolutionary perspective provides one possible explanation for why different forms of infidelity may affect people differently.
        </div>

        <h3>The Bottom Line</h3>
        <p>Jealousy is a normal human emotion that almost everyone experiences at some point. It's not a sign that someone is "crazy" or overly emotional. Instead, jealousy often signals that a person perceives a threat to a relationship they value.</p>
        <p>However, not all jealousy reflects reality. Sometimes it develops because of a genuine threat, while other times it stems from insecurity, low self-esteem, or past experiences. Factors such as attachment style, personality, and relationship confidence all influence how people experience and respond to jealousy.</p>
        <p>Recognizing why jealousy occurs is the first step toward managing it in a healthy way. Rather than making assumptions or reacting impulsively, open communication, trust, and self-awareness can help partners address concerns before jealousy begins to damage the relationship.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--yield)">
        <div class="topic-kicker">Reflection question</div>
        <p>Do you think jealousy is always harmful, or can it sometimes serve a useful purpose in relationships?</p>
      </div>
    `;
  }

  function buildLyingArticle(){
    return `
      <div class="article-body reveal in">
        <h3>Why Do People Lie?</h3>
        <p>You may wonder why someone would lie to a person they care about. Surprisingly, lying is very common in close relationships. People lie for many different reasons, and while some lies are intended to protect others, others can damage trust. In fact, it was found that only 5% of people reported telling no lies during a given week. That means 95% of people reported lying at least once that week (Need Citation Here).</p>
        <p>Most lies are told to benefit the person telling them. Reasons for this can include saving themselves from embarrassment, guilt, or inconvenience, seeking approval from someone, or trying to gain something materialistic. In relationships where someone is trying to appeal to a person they are attracted to, people often lie to increase their likeability.</p>

        <h3>Are All Lies Selfish: Benevolent Lies</h3>
        <p>Not every lie is told for selfish reasons. Some lies are told to protect another person's feelings. This is often done to protect someone's feelings and advance their interests. People are very likely to lie when they believe the truth would hurt another person's feelings.</p>
        <p>Some lies are told simply to maintain polite and friendly interactions. People may pretend to agree with someone, compliment something they don't actually like, or express more enthusiasm than they actually feel. These types of lies are known as benevolent lies because they are meant to protect someone else, instead of benefitting the person telling the lie.</p>

        <h3>Lying Between Partners</h3>
        <p>Even in healthy relationships, partners aren't completely honest with one another. They might express more affection than they actually feel or tell their partner they're more attractive than they personally believe.</p>
        <p>Overall, people tell fewer lies to those they are closest to, and those lies are generally less self-serving than the lies they tell strangers or acquaintances. However, when someone tells a lie about serious topics that can destroy their reputation or relationship, they're more likely to tell those lies to their closest partners than anyone else.</p>
        <p>Even when a lie goes undetected, people generally describe those interactions as less pleasant, less intimate, and more uncomfortable than honest conversations.</p>

        <h3>Deceiver's Distrust: Why Liars Become More Suspicious</h3>
        <p>Surprisingly, lying can also change how the person telling the lie views their partner. This is called deceiver's distrust. When people lie to others, they often begin to perceive the person they are lying to as less honest and trustworthy. This seems to occur because the person who is lying assumes that the other person is just like them.</p>
        <p>Believing that someone else is dishonest can also make the liar feel better about themselves. People who tell lies in relationships often perceive their lies as being less harmful than the person who is actually receiving the lie experiences them to be.</p>

        <h3>All About Lies and Liars</h3>
        <p>Some people lie more than others. People who are more concerned about the impression they leave on others and who are more outgoing tend to tell more lies than those who are not. Someone who has a secure attachment style tells fewer lies than someone who has a more insecure attachment style.</p>
        <p>People often lie better when there is high motivation, such as guilt or fear. Lies are often shorter and less detailed than truthful stories.</p>
        <p>There is a common misconception that when people lie they become fidgety, avoid eye contact, appear shifty, or look nervous. However, liars can also appear calm and confident. A more reliable way to determine whether someone is lying is by paying attention to what they are saying rather than how they are saying it. For example, inconsistent statements or differences between verbal and non-verbal communication may suggest deception.</p>

        <h3>How Well Can We Detect a Partner's Lie?</h3>
        <p>Specific reactions that seem to indicate someone is lying do not always have a clear cause. People have different mannerisms, which makes detecting lies difficult. Although lying often causes changes in behaviour, you usually have to be familiar with a person before you can recognize those changes.</p>
        <p>People can learn to detect lies in others. In close relationships, partners often know each other very well, making changes in behaviour easier to notice. However, people in close relationships also have truth bias, meaning they naturally believe the other person is telling the truth. As relationships develop, trust increases, which also decreases the perception that the other person is lying.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--plastic)">
        <div class="topic-kicker">Reflection question</div>
        <p>Do you think every lie damages a relationship, or are some lies easier to forgive than others? Why?</p>
      </div>
    `;
  }

  function buildBetrayalArticle(){
    return `
      <div class="article-body reveal in">
        <h3>Why Betrayal Hurts So Much</h3>
        <p>Betrayal is one of the most painful experiences a person can go through. It occurs when someone we trust violates that trust, leaving us feeling hurt, disappointed, angry, or even confused. Whether it happens in a friendship, family relationship, or romantic relationship, betrayal can have lasting effects on both the relationship and the people involved.</p>
        <p>People don't always do what we want them to do or what we expect them to do. Some surprises our partners give us can be positive, while others can be harmful. Betrayal can occur when someone does something that does not align with the standards and expectations we have for them. Common types of betrayal in close relationships include infidelity and lying. However, behaviours that violate benevolence, loyalty, respect, and trustworthiness, qualities that support intimate relationships, can also be considered forms of betrayal.</p>
        <p>Other examples of betrayal include gossiping, revealing secrets, making hurtful jokes, breaking promises, or failing to provide support when it is needed. These actions can lead to painful drops in how someone views the value of the relationship. When we experience betrayal, it can feel like the other person does not value the relationship as much as we thought they did.</p>
        <p>When we are in a close relationship with someone, it is unfortunately possible to feel betrayed and hurt by them in ways that no one else can. Often, the people who hurt us the most are close friends, family members, or romantic partners because we trust and care about them deeply. However, these individuals are not always trying to intentionally hurt us. Caring and trust are important parts of intimacy, but maintaining multiple close relationships can sometimes be difficult. Trying to balance different relationships can lead to misunderstandings, disappointment, and feelings of disconnect.</p>
        <p>For example, imagine two friends are hosting birthday parties on the same day. It may be difficult to decide which party to attend, and one friend may end up feeling hurt or disappointed. Although there may not be harmful intentions, the situation can still create feelings of betrayal.</p>

        <h3>Does Everyone Experience Betrayal the Same Way?</h3>
        <p>Betrayal is more common among some individuals than others. Research suggests that betrayal is less common among people who are older, more educated, and more religious (NEED CITATION HERE). People who betray others often experience lower levels of happiness and may be more resentful or suspicious of others. They may also be more likely to experience jealousy and have a history of unstable family relationships.</p>
        <p>People who betray others often struggle with trust because they may believe that other people's motives are not genuine. This can happen because they view others through their own experiences and behaviours. Research also suggests that men may be more likely to betray romantic partners, while women may be more likely to experience betrayal within friendships or family relationships.</p>

        <h3>The Two Sides of Betrayal</h3>
        <p>People who betray their intimate partners often underestimate the amount of harm they cause. Unlike simple lying, betrayal can involve deeper violations of trust and the expectations people have within close relationships. Those who commit betrayal may try to minimize their actions or convince themselves that what they did was not as harmful as it actually was.</p>
        <p>However, for the person who experiences betrayal, the emotional impact can be much greater. Feelings of hurt, disappointment, anger, and loss of trust can strongly affect how they view the relationship moving forward.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--plastic)">
        <div class="topic-kicker">Discussion question</div>
        <p>Have you ever experienced betrayal in a close relationship? How did it affect your trust and view of that relationship?</p>
      </div>
    `;
  }

  function buildRevengeArticle(){
    return `
      <div class="article-body reveal in">
        <p>Imagine this:</p>
        <p>Your best friend shares an embarrassing story about you in front of a group of people, even though you trusted them to keep it private. Everyone laughs, but you feel humiliated. You feel betrayed. Later that day, you notice they accidentally left their phone behind. For a brief moment, you think about posting one of their embarrassing photos online or telling one of their secrets just to make them feel the same way you did.</p>
      </div>

      <ul class="quote-list">
        <li>Would getting even make you feel better?</li>
        <li>Would it repair the friendship they just broke?</li>
        <li>Or would it simply cause more pain?</li>
      </ul>

      <div class="article-body reveal in">
        <h3>Understanding Revenge</h3>
        <p>Revenge is often an outcome of betrayal or lying. When people feel that they have been wronged, hurt, or disrespected by someone they trust, they may experience a strong desire to get back at that person. This desire usually comes from wanting the other person to understand the pain they caused or wanting to feel like justice has been restored.</p>
        <p>However, although revenge may feel justified in the moment, it often creates more problems than it solves. The desire for revenge is usually connected to strong emotions such as anger, disappointment, and feelings of unfairness. These emotions can make it difficult to think about the long-term consequences of seeking revenge.</p>

        <h3>Why Can Revenge Be a Bad Idea?</h3>
        <p>Revenge is often considered a harmful response because it can create an ongoing cycle of hurt. One person causes harm, the other person responds by hurting them back, and the cycle continues. In these situations, it becomes difficult to determine who is the victim and who is the perpetrator because both people may believe that they are the one who was wronged.</p>
        <p>People also often disagree about what level of punishment or retaliation is deserved. One person may believe that their actions are justified because they were hurt first, while the other person may believe that the response was worse than the original action. This creates a cycle where both people continue to focus on proving that they were the one who was harmed.</p>
        <p>For example, if someone lies to their partner and their partner responds by trying to embarrass them publicly, the person who lied may focus on the embarrassment they experienced rather than recognizing the original betrayal. Both people may begin to see themselves as the victim, making it harder to resolve the conflict.</p>

        <h3>The Double Standard of Revenge</h3>
        <p>Another reason revenge can be difficult to justify is because people often have a double standard when it comes to being hurt.</p>
        <p>Some individuals may believe that it is acceptable when they hurt someone else, but when someone hurts them in return, they view it as unfair. People naturally tend to judge their own actions based on their intentions while judging others based on the impact of their actions.</p>
        <p>This makes revenge complicated because both people may believe they are justified. Instead of repairing the relationship, revenge often creates more resentment, anger, and distance between people.</p>

        <h3>Revenge Is Not Always as Satisfying as It Seems</h3>
        <p>Often, the idea of revenge feels much better than the actual experience of revenge. When someone imagines revenge or plans how they will get back at another person, it can temporarily create a sense of control or satisfaction.</p>
        <p>However, acting on revenge does not always provide the emotional relief people expect. Instead, it can make it harder to heal from the original hurt because the person remains focused on the person who harmed them.</p>
        <p>People who make seeking revenge their main goal may hold onto their anger and pain for longer than people who accept the hurt, find healthy ways to cope, and move forward. While revenge may provide temporary satisfaction, it does not always address the deeper emotional pain caused by betrayal.</p>

        <h3>Seeking Revenge to Be Seen</h3>
        <p>Many people seek revenge because they want the other person to recognize the pain they caused. Revenge can feel more meaningful when the person who caused harm understands the consequences of their actions.</p>
        <p>However, revenge often becomes less satisfying when the other person does not recognize why they are being punished. Think about how often someone actually admits that they understand they caused another person pain. In many situations, this rarely happens.</p>
        <p>When the person who caused harm does not acknowledge their actions, the person seeking revenge may feel even more frustrated and disappointed. Instead of receiving closure, they may experience more anger.</p>
        <p>Research suggests that people who focus heavily on revenge often experience more unhappiness compared to those who find healthier ways to cope with hurt. In close relationships, people who seek revenge may also engage in manipulative or harmful behaviours that make rebuilding trust even more difficult.</p>
        <p>Although being hurt by someone can create a strong desire to hurt them back, revenge often prevents people from moving forward. Healing usually requires understanding the hurt, processing emotions, and deciding what actions will actually help restore personal well-being.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--fracture)">
        <div class="topic-kicker">Discussion</div>
        <p>When you seek revenge, what usually drives the urge to seek it?</p>
      </div>
    `;
  }

  function buildForgivenessArticle(){
    return `
      <div class="article-body reveal in">
        <h3>What Does It Really Mean to Forgive?</h3>
        <p>When someone hurts us, forgiving them is often one of the hardest things to do. Forgiveness does not mean that what the other person did was okay or that we have to forget what happened. Instead, forgiveness is the decision to let go of anger, resentment, and the desire to get revenge. It's about choosing to move forward rather than staying stuck in the pain.</p>
        <p>Forgiveness can be an important part of repairing a relationship after betrayal, but it is not always easy. According to researchers, forgiveness is giving up the desire to "get even" with someone who has wronged you. Instead of continuing a cycle of hurt and retaliation, forgiveness allows both people the opportunity to heal and rebuild trust if they are both willing to put in the effort.</p>

        <h3>Why is Forgiveness So Difficult?</h3>
        <p>Everyone forgives differently. Some people find it easier to forgive because they are more empathetic, emotionally secure, or better at managing their emotions. Others may struggle because they continue thinking about the betrayal, hold onto resentment, or have difficulty trusting others again.</p>
        <p>Forgiveness is also harder when the person who caused the hurt refuses to take responsibility for their actions. A sincere apology, accepting responsibility, showing genuine remorse, and making an effort to change all make forgiveness more likely. On the other hand, making excuses or giving an insincere apology often makes it much more difficult for the injured person to move on.</p>

        <h3>Does Forgiveness Have Limits?</h3>
        <p>Forgiveness does not only help the relationship, it can also improve a person's own well-being. Research has found that people who forgive often experience less anger, stress, and hostility, while also reporting greater life satisfaction and better overall health. In close relationships, forgiveness can reduce conflict, encourage honest communication, and make rebuilding trust more possible.</p>
        <p>However, forgiveness has limits. It does not mean staying in a relationship where someone repeatedly lies, cheats, or continues to cause harm without changing. Constantly forgiving someone who never takes responsibility can damage self-respect and prevent real problems from being solved. Forgiveness is healthiest when the person who caused the hurt is genuinely sorry and is willing to change their behavior.</p>

        <h3>The Bottom Line</h3>
        <p>Forgiveness is not about pretending the hurt never happened. It is about making a conscious choice to let go of resentment and deciding whether the relationship is worth repairing. While forgiveness can strengthen relationships and improve emotional well-being, it should not come at the cost of accepting repeated disrespect or unhealthy behavior. Healthy forgiveness requires honesty, accountability, empathy, and a genuine commitment to rebuilding trust.</p>
      </div>

      <div class="reflection-callout reveal in" style="--accent:var(--repair)">
        <div class="topic-kicker">Reflection question</div>
        <p>Can a relationship truly recover through forgiveness if the person who caused the betrayal never takes full responsibility for their actions? Why or why not?</p>
      </div>

    `;
  }

  const bar = document.getElementById('progress-bar');
  function updateProgress(){
    const h = document.documentElement;
    const scrollTop = h.scrollTop || document.body.scrollTop;
    const scrollHeight = h.scrollHeight - h.clientHeight;
    const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    bar.style.width = pct + '%';
    bar.style.backgroundPosition = pct + '% 0%';
  }
  let ticking = false;
  function onScroll(){
    if(!ticking){
      window.requestAnimationFrame(()=>{ updateProgress(); ticking = false; });
      ticking = true;
    }
  }
  window.addEventListener('scroll', onScroll);
  window.addEventListener('resize', onScroll);
  onScroll();
