<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress and Strain: Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>
<div id="progress-bar"></div>

<header class="site-nav">
  <div class="brand">stress<span>&amp;</span>strain</div>
  <nav class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="index.html#articles">Articles</a>
    <a href="interviews.html">Interviews</a>
  </nav>
</header>

<main class="simple-main">

  <a class="back-link reveal in" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back to stories
  </a>

  <div id="story-content"></div>

  <footer>
    <div>FAMLYSTU group 84</div>
  </footer>

</main>

<script>
  const STORIES = {
    "perceived-relational-value": {
      accent: "elastic",
      icon: '<circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/>',
      title: "Perceived relational value"
    },
    "hurt-feelings": {
      accent: "elastic",
      icon: '<path d="M12 21s-7-4.35-9.33-8.9C1.2 8.7 3 5 6.6 5c2 0 3.4 1.2 5.4 3.6C14 6.2 15.4 5 17.4 5 21 5 22.8 8.7 21.33 12.1 19 16.65 12 21 12 21z"/>',
      title: "Hurt feelings &rarr; relational devaluation"
    },
    "ostracism": {
      accent: "elastic",
      icon: '<path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke-dasharray="2 3"/>',
      title: "Ostracism &rarr; the silent treatment"
    },
    "jealousy-types": {
      accent: "yield",
      icon: '<path d="M12 2l2.4 6.9L21 9l-5.5 4.3L17 21l-5-3.7L7 21l1.5-7.7L3 9l6.6-0.1z"/>',
      title: "Types of jealousy"
    },
    "jealousy-prone": {
      accent: "yield",
      icon: '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      title: "Who is more prone to jealousy"
    },
    "evolutionary-perspective": {
      accent: "yield",
      icon: '<path d="M3 12h4l3-9 4 18 3-9h4"/>',
      title: "The evolutionary perspective"
    },
    "lying": {
      accent: "plastic",
      icon: '<path d="M9 12h6M9 16h6M9 8h6"/><rect x="4" y="4" width="16" height="16" rx="2"/>',
      title: "Lying in close relationships"
    },
    "betrayal": {
      accent: "plastic",
      icon: '<path d="M12 2C8 2 4 6 4 10c0 5 8 12 8 12s8-7 8-12c0-4-4-8-8-8z"/><path d="M9 10l2 2 4-4" stroke-dasharray="1 3"/>',
      title: "Betrayal"
    },
    "revenge": {
      accent: "fracture",
      icon: '<path d="M13 2L4 14h6l-1 8 9-12h-6z"/>',
      title: "Revenge"
    },
    "forgiveness-ruth-berger": {
      accent: "repair",
      icon: '<path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.5l-1-.9a5.5 5.5 0 00-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 000-7.8z"/>',
      title: "Forgiveness and the case of Ruth Berger"
    }
  };

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('story');
  const story = STORIES[slug];
  const container = document.getElementById('story-content');

  const placeholderText = Array(51).fill('placeholder').join(' ');
  const placeholderSentence = placeholderText.charAt(0).toUpperCase() + placeholderText.slice(1) + '.';

  function buildFlashcards(){
    let cards = '';
    for(let i = 1; i <= 10; i++){
      cards += `
        <div class="flashcard reveal in" style="animation-delay:${i * 0.05}s" data-index="${i}">
          <div class="flashcard-inner">
            <div class="flashcard-face flashcard-front">
              <div class="flashcard-num">Card ${i}</div>
              <div class="flashcard-word">Placeholder</div>
            </div>
            <div class="flashcard-face flashcard-back">
              <div class="flashcard-num">Card ${i}</div>
              <div class="flashcard-word">Placeholder</div>
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="flashcard-grid reveal in">${cards}</div>
      <p class="flashcard-hint reveal in">Tap a card to flip it.</p>
    `;
  }

  if(story){
    document.title = 'Stress and Strain: ' + story.title.replace(/&rarr;/g, '->');
    const bodyHTML = (slug === 'lying' || slug === 'jealousy-types')
      ? buildFlashcards()
      : `<p class="topic-placeholder reveal in" style="--accent:var(--${story.accent})">
          <span class="draft-tag">Draft</span>${placeholderSentence}
        </p>`;

    container.innerHTML = `
      <div class="story-hero reveal in" style="--accent:var(--${story.accent})">
        <div class="topic-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">${story.icon}</svg></div>
        <div>
          <div class="topic-kicker">Story</div>
          <h1>${story.title}</h1>
        </div>
      </div>
      ${bodyHTML}

      <section class="engage reveal in" id="engage">
        <h2>Tell us where your line would bend.</h2>
        <p class="lead">Drop a reflection on this story specifically, a story of your own, or just react to what you read above.</p>
        <form class="comment-form" id="comment-form">
          <input type="text" id="name-input" placeholder="Your name" required>
          <textarea id="msg-input" placeholder="Share a thought or a story of your own" required></textarea>
          <button type="submit">Post reflection</button>
        </form>
        <div id="comment-list"></div>
      </section>
    `;

    if(slug === 'lying' || slug === 'jealousy-types'){
      container.querySelectorAll('.flashcard').forEach(card => {
        card.addEventListener('click', () => card.classList.toggle('flipped'));
      });
    }

    const form = document.getElementById('comment-form');
    const list = document.getElementById('comment-list');

    function addComment(c){
      const div = document.createElement('div');
      div.className = 'comment';
      const who = document.createElement('div');
      who.className = 'who';
      who.textContent = c.who;
      const msg = document.createElement('div');
      msg.textContent = c.msg;
      div.appendChild(who);
      div.appendChild(msg);
      list.appendChild(div);
    }

    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      const name = document.getElementById('name-input').value.trim();
      const msg = document.getElementById('msg-input').value.trim();
      if(!name || !msg) return;
      addComment({who:name, msg:msg});
      form.reset();
    });
  } else {
    container.innerHTML = `
      <div class="story-hero reveal in">
        <div>
          <div class="topic-kicker">Story not found</div>
          <h1>We could not find that one.</h1>
        </div>
      </div>
      <p class="topic-placeholder reveal in">Head back to the home page and pick a story from the list.</p>
    `;
  }

  const bar = document.getElementById('progress-bar');
  function updateProgress(){
    const h = document.documentElement;
    const scrollTop = h.scrollTop || document.body.scrollTop;
    const scrollHeight = h.scrollHeight - h.clientHeight;
    const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    bar.style.width = pct + '%';
    bar.style.backgroundPosition = pct + '% 0%';
  }
  let ticking = false;
  function onScroll(){
    if(!ticking){
      window.requestAnimationFrame(()=>{ updateProgress(); ticking = false; });
      ticking = true;
    }
  }
  window.addEventListener('scroll', onScroll);
  window.addEventListener('resize', onScroll);
  onScroll();
</script>

</body>
</html>
