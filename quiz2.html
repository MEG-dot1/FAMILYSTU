<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress and Strain: Quiz 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>
<div id="progress-bar"></div>

<header class="site-nav">
  <div class="brand">stress<span>&amp;</span>strain</div>
  <nav class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="index.html#articles">Articles</a>
    <a href="interviews.html">Interviews</a>
  </nav>
</header>

<main class="simple-main">

  <a class="back-link reveal in" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back to home
  </a>

  <div id="quiz-app"></div>

  <footer>
    <div>FAMLYSTU group 84</div>
  </footer>

</main>

<script>
  // quiz #2 - same setup as quiz.html but for lying/betrayal/revenge instead.
  // copy pasted the structure from quiz 1 tbh, just swapped the questions
  const QUESTIONS = [
    {
      q: "Why do people commonly lie in close relationships?",
      options: [
        "To always intentionally hurt the other person",
        "To benefit themselves, avoid conflict, seek approval, or protect someone's feelings",
        "Because they do not care about relationships",
        "Because close relationships are built on dishonesty"
      ],
      correct: 1
    },
    {
      q: "What is \"deceiver's distrust\"?",
      options: [
        "When someone refuses to forgive a person who lied to them",
        "When someone becomes more trusting after telling a lie",
        "When a person who lies begins to see the person they lied to as less honest and trustworthy",
        "When two people decide to end a relationship after conflict"
      ],
      correct: 2
    },
    {
      q: "Why can betrayal feel especially painful in close relationships?",
      options: [
        "Because strangers are usually more important than loved ones",
        "Because people are emotionally vulnerable and trust those closest to them",
        "Because betrayal only happens in romantic relationships",
        "Because people always intend to hurt others when they betray them"
      ],
      correct: 1
    },
    {
      q: "Why is revenge often considered harmful in relationships?",
      options: [
        "It always immediately fixes the original problem",
        "It helps both people understand each other better",
        "It can create a cycle of hurt where both people continue seeing themselves as the victim",
        "It guarantees that the other person will apologize"
      ],
      correct: 2
    },
    {
      q: "Why does revenge often feel more satisfying in imagination than in reality?",
      options: [
        "Because planning revenge can create temporary feelings of control, but acting on it may not heal the original hurt",
        "Because revenge always makes people happier long-term",
        "Because the person who caused harm always understands why they are being punished",
        "Because revenge removes all negative emotions immediately"
      ],
      correct: 0
    }
  ];

  const app = document.getElementById('quiz-app');
  let currentIndex = 0;
  let score = 0;
  let answered = false;

  const checkSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>';
  const xSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6L6 18"/></svg>';

  function renderIntro(){
    app.innerHTML = `
      <div class="quiz-intro reveal in">
        <div class="eyebrow" style="justify-content:center;">Quick check</div>
        <h1>Round two: five more questions.</h1>
        <p>This one covers lying, betrayal, and revenge. Pick an answer for each question and get your score out of 100 at the end.</p>
        <button class="quiz-start-btn" id="start-btn">Start quiz</button>
      </div>
    `;
    document.getElementById('start-btn').addEventListener('click', () => {
      currentIndex = 0;
      score = 0;
      renderQuestion();
    });
  }

  function renderDots(){
    let dots = '';
    for(let i = 0; i < QUESTIONS.length; i++){
      let cls = 'quiz-dot';
      if(i < currentIndex) cls += ' done';
      if(i === currentIndex) cls += ' active';
      dots += `<div class="${cls}"></div>`;
    }
    return `<div class="quiz-progress">${dots}</div>`;
  }

  function renderQuestion(){
    answered = false;
    const item = QUESTIONS[currentIndex];
    let optionsHTML = '';
    item.options.forEach((opt, i) => {
      optionsHTML += `
        <button class="quiz-option" data-index="${i}">
          <span>${opt}</span>
          <span class="opt-mark"></span>
        </button>
      `;
    });

    app.innerHTML = `
      ${renderDots()}
      <div class="quiz-question-enter">
        <div class="quiz-question-num">Question ${currentIndex + 1} of ${QUESTIONS.length}</div>
        <h2 class="quiz-question-text">${item.q}</h2>
        <div class="quiz-options">${optionsHTML}</div>
        <div class="quiz-next-wrap" id="next-wrap">
          <button class="quiz-next-btn" id="next-btn">${currentIndex === QUESTIONS.length - 1 ? 'See results' : 'Next question'}</button>
        </div>
      </div>
    `;

    const optionButtons = app.querySelectorAll('.quiz-option');
    optionButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if(answered) return;
        answered = true;
        const chosen = parseInt(btn.getAttribute('data-index'));
        const correct = item.correct;
        if(chosen === correct) score += 20;

        optionButtons.forEach(b => {
          const idx = parseInt(b.getAttribute('data-index'));
          b.classList.add('locked');
          if(idx === correct){
            b.classList.add('correct');
            b.querySelector('.opt-mark').innerHTML = checkSVG;
          } else if(idx === chosen){
            b.classList.add('wrong');
            b.querySelector('.opt-mark').innerHTML = xSVG;
          }
        });

        document.getElementById('next-wrap').classList.add('show');
      });
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if(currentIndex < QUESTIONS.length - 1){
        currentIndex++;
        renderQuestion();
      } else {
        renderResults();
      }
    });
  }

  function renderResults(){
    const r = 76;
    const circumference = 2 * Math.PI * r;

    let message = "Nice work.";
    if(score === 100) message = "Perfect score, you were paying attention.";
    else if(score >= 60) message = "Pretty solid, a few slipped through.";
    else message = "Might be worth another pass through the stories.";

    app.innerHTML = `
      <div class="quiz-results reveal in">
        <div class="score-ring">
          <svg viewBox="0 0 180 180">
            <circle class="bg" cx="90" cy="90" r="${r}"></circle>
            <circle class="fg" id="score-circle" cx="90" cy="90" r="${r}"
              stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"></circle>
          </svg>
          <div class="score-num" id="score-num">0</div>
        </div>
        <h2>You scored ${score} out of 100</h2>
        <p class="result-msg">${message}</p>
        <div class="quiz-results-actions">
          <button class="quiz-start-btn" id="retake-btn">Retake quiz</button>
          <a class="quiz-btn-secondary" href="index.html">Back to home</a>
        </div>
      </div>
    `;

    const circle = document.getElementById('score-circle');
    const offset = circumference - (score / 100) * circumference;
    requestAnimationFrame(() => {
      circle.style.stroke = score >= 60 ? 'var(--elastic)' : 'var(--fracture)';
      circle.style.strokeDashoffset = offset;
    });

    const numEl = document.getElementById('score-num');
    let displayed = 0;
    const duration = 1000;
    const stepTime = 16;
    const steps = duration / stepTime;
    const increment = score / steps;
    const counter = setInterval(() => {
      displayed += increment;
      if(displayed >= score){
        displayed = score;
        clearInterval(counter);
      }
      numEl.textContent = Math.round(displayed);
    }, stepTime);

    document.getElementById('retake-btn').addEventListener('click', () => {
      currentIndex = 0;
      score = 0;
      renderQuestion();
    });
  }

  renderIntro();

  const bar = document.getElementById('progress-bar');
  function updateProgress(){
    const h = document.documentElement;
    const scrollTop = h.scrollTop || document.body.scrollTop;
    const scrollHeight = h.scrollHeight - h.clientHeight;
    const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    bar.style.width = pct + '%';
    bar.style.backgroundPosition = pct + '% 0%';
  }
  let ticking = false;
  function onScroll(){
    if(!ticking){
      window.requestAnimationFrame(()=>{ updateProgress(); ticking = false; });
      ticking = true;
    }
  }
  window.addEventListener('scroll', onScroll);
  window.addEventListener('resize', onScroll);
  onScroll();
</script>

</body>
</html>
